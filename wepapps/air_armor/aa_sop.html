<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIR & ARMOR — SOP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ── 냉전 팔레트 ──
   배경: 올리브 드랩 / 패널: 짙은 카키
   액센트: 전술 황색(NATO) + 적색(WP)
   폰트: 모노스페이스 군용 터미널 느낌 */
:root {
  --bg:       #2a2e26;   /* 올리브 다크 */
  --surface:  #343830;   /* 패널 배경 */
  --surface2: #3c4038;   /* 규칙 패널 배경 */
  --border:   #4e5445;   /* 경계선 */
  --border2:  #606858;   /* 강조 경계 */
  --text:     #d8dcc4;   /* 기본 텍스트 */
  --text-dim: #8a9278;   /* 보조 텍스트 */
  --nato:     #d4ae55;   /* NATO 황색 */
  --wp:       #8b1a1a;   /* WP 적색 */
  --wp-bright:#c0392b;
  --green:    #6a8e48;   /* 진지 녹색 */
  --green-lt: #90b860;   /* 밝은 녹색 */
  --mono: 'Share Tech Mono', 'Courier New', monospace;
  --title: 'Oswald', 'Arial Narrow', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--mono);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── 헤더 ── */
header {
  background: var(--surface);
  border-bottom: 2px solid var(--nato);
  padding: 8px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: relative;
}
.header-left { display: flex; align-items: center; gap: 16px; }
header h1 {
  font-family: var(--title);
  font-size: 1.1rem;
  color: var(--nato);
  letter-spacing: 4px;
  font-weight: 700;
  text-transform: uppercase;
  white-space: nowrap;
}
.breadcrumb { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 0.5px; }
.breadcrumb a { color: var(--green-lt); text-decoration: none; cursor: pointer; }
.breadcrumb a:hover { color: var(--nato); }
.breadcrumb .sep { margin: 0 6px; color: var(--border2); }
.breadcrumb .current { color: var(--nato); font-weight: 600; }
.kbd-hint { font-size: 0.63rem; color: var(--text-dim); white-space: nowrap; letter-spacing: 1px; }

/* ── 진행도 ── */
.progress-wrap {
  background: var(--surface);
  padding: 6px 18px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.progress-meta {
  display: flex;
  justify-content: space-between;
  font-size: 0.65rem;
  color: var(--text-dim);
  margin-bottom: 5px;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.progress-meta .phase-name { color: var(--nato); font-weight: 600; }
.progress-segs { display: flex; gap: 2px; }
.seg {
  flex: 1; height: 4px; background: var(--border);
  transition: background 0.2s;
  cursor: pointer;
  position: relative;
}
.seg:hover { opacity: 0.9; }
.seg.done { background: var(--green); }
.seg.active { background: var(--nato); }
.seg-label {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.6rem;
  background: var(--nato);
  color: #1a1600;
  padding: 2px 6px;
  white-space: nowrap;
  display: none;
  pointer-events: none;
  z-index: 10;
  font-family: var(--mono);
  letter-spacing: 0.5px;
}
.seg:hover .seg-label { display: block; }

/* ── 메인 2패널 ── */
main {
  display: flex;
  flex: 1;
  overflow: hidden;
  gap: 2px;
  background: var(--border);
}

/* ── 왼쪽 패널 ── */
.panel-left {
  width: 36%;
  background: var(--surface);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-label {
  padding: 6px 16px;
  font-size: 0.6rem;
  color: var(--text-dim);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 600;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  font-family: var(--mono);
}
.step-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 18px 20px 16px;
}
.step-phase-tag {
  display: inline-block;
  font-size: 0.65rem;
  font-weight: 600;
  color: var(--green-lt);
  letter-spacing: 2px;
  margin-bottom: 8px;
  text-transform: uppercase;
  border: 1px solid var(--green);
  padding: 2px 8px;
}
.step-num {
  font-family: var(--title);
  font-size: 3.4rem;
  font-weight: 700;
  color: var(--nato);
  line-height: 1;
  margin-bottom: 4px;
}
.step-title {
  font-family: var(--title);
  font-size: 1.3rem;
  font-weight: 600;
  color: #e8e4c8;
  margin-bottom: 16px;
  letter-spacing: 1px;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border2);
  padding-bottom: 12px;
}
/* step-body 내 문장 단위 아이템 */
.step-body {
  margin-bottom: 14px;
}
.step-body-item {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  font-size: 0.95rem;
  line-height: 1.75;
  color: var(--text);
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
}
.step-body-item:last-child { border-bottom: none; }
.step-body-bullet {
  color: var(--nato);
  flex-shrink: 0;
  font-size: 0.7rem;
  margin-top: 6px;
  opacity: 0.7;
}
.step-body-text { flex: 1; }
.step-note {
  background: rgba(139,26,26,0.15);
  border-left: 3px solid var(--wp-bright);
  padding: 10px 13px;
  font-size: 0.88rem;
  color: #e8a0a0;
  margin-bottom: 16px;
}
.step-note strong { color: #ff8080; }

/* 작전 선택 */
.op-choices { margin-top: 6px; }
.op-choices-label {
  font-size: 0.6rem;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 9px;
}
.op-btns { display: flex; flex-wrap: wrap; gap: 7px; }
.op-btn {
  padding: 7px 13px;
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text);
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.12s;
  font-family: var(--mono);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.op-btn:hover { background: rgba(200,168,75,0.1); border-color: var(--nato); color: var(--nato); }
.op-btn.active { background: rgba(200,168,75,0.15); border-color: var(--nato); color: var(--nato); font-weight: 700; }

/* 하위 시퀀스 진입 버튼 */
.sub-enter-btn {
  margin-top: 16px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 18px;
  background: var(--nato);
  color: #1a1600;
  border: none;
  font-size: 0.8rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.12s;
  font-family: var(--mono);
  letter-spacing: 1px;
  text-transform: uppercase;
}
.sub-enter-btn:hover { background: #e0c060; }
.sub-enter-btn .arrow { font-size: 1rem; }

/* ── 오른쪽 패널 ── */
.panel-right {
  flex: 1;
  background: var(--surface2);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.rules-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 12px 14px;
}
.no-refs {
  color: var(--text-dim);
  font-size: 0.78rem;
  text-align: center;
  padding: 30px 16px;
  letter-spacing: 1px;
}

/* 규칙 카드 */
.rule-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  margin-bottom: 10px;
  overflow: hidden;
}
.rule-card-head {
  background: rgba(200,168,75,0.08);
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 9px;
  border-bottom: 1px solid var(--border2);
}
.rule-id {
  background: var(--nato);
  color: #1a1600;
  padding: 2px 8px;
  font-size: 0.68rem;
  font-family: var(--mono);
  font-weight: 700;
  letter-spacing: 1px;
  white-space: nowrap;
}
.rule-title {
  font-size: 0.82rem;
  font-weight: 600;
  color: #e8e4c8;
  letter-spacing: 0.5px;
  font-family: var(--title);
  text-transform: uppercase;
}
.rule-card-body {
  padding: 11px 13px;
  font-size: 0.8rem;
  line-height: 1.75;
  color: var(--text);
}
.rule-card-body p { margin-bottom: 6px; }
.rule-card-body p:last-child { margin-bottom: 0; }

/* 하위 섹션 */
.rule-sub {
  margin-top: 9px;
  padding-top: 9px;
  border-top: 1px solid var(--border);
}
.rule-sub-head {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 5px;
}
.rule-sub-id {
  background: var(--green);
  color: #e8f0d0;
  padding: 1px 7px;
  font-size: 0.64rem;
  font-family: var(--mono);
  font-weight: 700;
  letter-spacing: 0.5px;
}
.rule-sub-title {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--green-lt);
  font-family: var(--title);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ── 하단 네비게이션 ── */
footer {
  background: var(--surface);
  border-top: 2px solid var(--border2);
  padding: 8px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.nav-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 18px;
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text);
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.12s;
  font-family: var(--mono);
  letter-spacing: 1px;
  text-transform: uppercase;
}
.nav-btn:hover:not(:disabled) { background: rgba(200,168,75,0.1); border-color: var(--nato); color: var(--nato); }
.nav-btn:disabled { opacity: 0.2; cursor: default; }
.nav-btn .arrow { font-size: 0.9rem; }
.nav-center { text-align: center; }
.step-counter { font-size: 0.75rem; color: var(--text-dim); letter-spacing: 1px; }
.step-counter strong { color: var(--nato); font-size: 1rem; font-weight: 700; }
.kbd-hint-foot { font-size: 0.6rem; color: var(--text-dim); margin-top: 2px; letter-spacing: 1px; }

/* ── 로딩 ── */
#loading {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  z-index: 999;
}
#loading .spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border2);
  border-top-color: var(--nato);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading p { font-size: 0.78rem; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }

/* 인라인 소제목 (볼드 헤더) */
.rule-subhead {
  font-size: 0.8rem;
  line-height: 1.7;
  color: var(--text);
  margin-bottom: 6px;
  padding-top: 4px;
}
.rule-subhead strong {
  color: var(--nato);
  font-weight: 700;
}

/* 세그먼트 블록 */
.rule-seg {
  margin-bottom: 10px;
  border-left: 2px solid var(--green);
  padding-left: 10px;
}
.rule-seg-title {
  font-size: 0.68rem;
  font-weight: 700;
  color: var(--green-lt);
  margin-bottom: 3px;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-family: var(--title);
}
.rule-seg-body {
  font-size: 0.8rem;
  line-height: 1.72;
  color: var(--text);
}

/* 규칙 번호/불릿 목록 */
.rule-list { margin: 6px 0; }
.rule-list-item {
  display: flex;
  gap: 8px;
  margin-bottom: 5px;
  font-size: 0.8rem;
  line-height: 1.7;
  color: var(--text);
}
.rule-list-num {
  font-weight: 700;
  color: var(--nato);
  min-width: 18px;
  flex-shrink: 0;
  font-family: var(--mono);
}

/* 플레이 노트 */
.rule-note {
  background: rgba(90,122,58,0.12);
  border-left: 2px solid var(--green);
  padding: 7px 10px;
  font-size: 0.76rem;
  color: #a8c080;
  margin: 8px 0;
  line-height: 1.65;
}

/* 스크롤바 */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); }
::-webkit-scrollbar-thumb:hover { background: var(--nato); }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>LOADING TACTICAL DATA...</p>
</div>

<header>
  <div class="header-left">
    <h1>▶ AIR &amp; ARMOR · SOP</h1>
    <div class="breadcrumb" id="breadcrumb"></div>
  </div>
  <div class="kbd-hint">← → 화살표 키로 이동</div>
</header>

<div class="progress-wrap">
  <div class="progress-meta">
    <span class="phase-name" id="phase-name"></span>
    <span id="step-fraction"></span>
  </div>
  <div class="progress-segs" id="progress-segs"></div>
</div>

<main>
  <div class="panel-left">
    <div class="panel-label">현재 스텝</div>
    <div class="step-scroll" id="step-panel"></div>
  </div>
  <div class="panel-right">
    <div class="panel-label">규칙 참조</div>
    <div class="rules-scroll" id="rules-panel"></div>
  </div>
</main>

<footer>
  <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">
    <span class="arrow">←</span> 이전
  </button>
  <div class="nav-center">
    <div class="step-counter"><strong id="cur-num">1</strong> / <span id="tot-num">1</span></div>
    <div class="kbd-hint-foot">← → 화살표 키</div>
  </div>
  <button class="nav-btn" id="btn-next" onclick="navigate(1)">
    다음 <span class="arrow">→</span>
  </button>
</footer>

<script>
// ──────────────────────────────────────────
// 상태
// ──────────────────────────────────────────
let SOP = null;
let RULES = null;  // { sectionId: { id, title, text, children } }

let stack = [];   // [{phaseId, stepIndex}]  네비게이션 스택
let phaseId = 'phase_1';
let stepIndex = 0;

// ──────────────────────────────────────────
// 로드
// ──────────────────────────────────────────
async function loadData() {
  const base = location.pathname.replace(/\/[^/]*$/, '/');
  const [sopRes, rulesRes] = await Promise.all([
    fetch('sop.json'),
    fetch('rules.json')
  ]);
  SOP = await sopRes.json();
  const rulesArr = await rulesRes.json();
  RULES = {};
  for (const r of rulesArr) RULES[r.id] = r;
}

function getPhase(id) {
  return SOP.phases.find(p => p.id === id);
}

// ──────────────────────────────────────────
// 렌더
// ──────────────────────────────────────────
function render() {
  const phase = getPhase(phaseId);
  const step = phase.steps[stepIndex];

  renderBreadcrumb(phase, step);
  renderProgress(phase);
  renderStepPanel(phase, step);
  renderRulesPanel(step);
  renderNav(phase);
}

function renderBreadcrumb(phase, step) {
  const bc = document.getElementById('breadcrumb');
  const parts = [];

  // 스택에 있는 이전 페이즈들
  for (const frame of stack) {
    const p = getPhase(frame.phaseId);
    const s = p.steps[frame.stepIndex];
    parts.push(`<a onclick="popToStack(${stack.indexOf(frame)})">${p.title}</a><span class="sep">›</span>`);
  }
  // 현재
  parts.push(`<span class="current">${phase.title}</span>`);

  bc.innerHTML = parts.join('');
}

function renderProgress(phase) {
  document.getElementById('phase-name').textContent = phase.title;
  document.getElementById('step-fraction').textContent = `${stepIndex + 1} / ${phase.steps.length}`;

  const segs = document.getElementById('progress-segs');
  segs.innerHTML = '';
  phase.steps.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'seg' + (i < stepIndex ? ' done' : i === stepIndex ? ' active' : '');
    d.title = s.title;
    const lbl = document.createElement('div');
    lbl.className = 'seg-label';
    lbl.textContent = `${i+1}. ${s.title}`;
    d.appendChild(lbl);
    d.addEventListener('click', () => { stepIndex = i; render(); });
    segs.appendChild(d);
  });

  document.getElementById('cur-num').textContent = stepIndex + 1;
  document.getElementById('tot-num').textContent = phase.steps.length;
}

// 스텝 본문을 문장 단위 불릿으로 분리
function renderStepBody(body) {
  if (!body) return '';
  // 마침표+공백 또는 마침표+끝으로 문장 분리
  // 단, 괄호 안 마침표(참조 표기 등)는 분리하지 않음
  const sentences = body
    .split(/(?<=[^0-9])\.\s+(?=[가-힣A-Z])/)
    .map(s => s.replace(/\.$/, '').trim())
    .filter(Boolean);

  if (sentences.length <= 1) {
    // 단일 문장은 그냥 표시
    return `<div class="step-body-item"><span class="step-body-text">${escHtml(body)}</span></div>`;
  }
  return sentences.map(s =>
    `<div class="step-body-item">
      <span class="step-body-bullet">▸</span>
      <span class="step-body-text">${escHtml(s)}.</span>
    </div>`
  ).join('');
}

function renderStepPanel(phase, step) {
  const panel = document.getElementById('step-panel');
  let html = '';

  html += `<div class="step-phase-tag">${phase.title} · ${phase.ref}</div>`;
  html += `<div class="step-num">${step.num}</div>`;
  html += `<div class="step-title">${step.title}</div>`;
  html += `<div class="step-body">${renderStepBody(step.body)}</div>`;

  if (step.note) {
    html += `<div class="step-note"><strong>주의:</strong> ${step.note}</div>`;
  }

  // 작전 선택지 (ac5)
  if (step.op_choices) {
    html += `<div class="op-choices">
      <div class="op-choices-label">작전 선택 — 하위 시퀀스 추적</div>
      <div class="op-btns">`;
    for (const op of step.op_choices) {
      html += `<button class="op-btn" onclick="enterSequence('${op.sequence}')">${op.label} →</button>`;
    }
    html += `</div></div>`;
  }

  // 하위 시퀀스 진입 버튼 (타격 세그먼트 등)
  if (step.sub_sequence && !step.op_choices) {
    const sub = getPhase(step.sub_sequence);
    if (sub) {
      html += `<button class="sub-enter-btn" onclick="enterSequence('${step.sub_sequence}')">
        <span>${sub.title} 진행</span><span class="arrow">→</span>
      </button>`;
    }
  }

  panel.innerHTML = html;
}

// xlsx 기반 데이터는 이미 올바른 띄어쓰기를 가짐 → 단순 정리만
function cleanRuleText(raw) {
  if (!raw) return raw || '';
  // 인라인 영어 병기 잔재 제거, 단락 구분(\n\n)은 유지
  return raw
    .replace(/([가-힣])([A-Z][A-Za-z\-]+(?:\s[A-Za-z\-]+)*)/g, '$1')
    .replace(/[^\S\n]{2,}/g, ' ')  // \n 제외한 공백만 정리
    .trim();
}

// 규칙 텍스트를 HTML로 변환
// xlsx 데이터 형식:
//   - "1. 텍스트" : 번호 목록 항목 (탭 없음)
//   - "제목. 본문" : 세그먼트 설명 (10.0 등)
//   - "플레이 노트: 텍스트" : 노트
//   - 일반 문단
function textToHtml(text) {
  if (!text) return '';
  text = cleanRuleText(text);

  // \n으로만 구분된 번호/불릿 목록도 단락 단위로 분리
  text = text.replace(/\n(\d+\.\s)/g, '\n\n$1');
  text = text.replace(/\n(-\s)/g, '\n\n$1');

  const paras = text.split('\n\n').filter(p => p.trim());

  // 연속된 번호 목록 항목을 하나의 리스트로 묶기 위해 먼저 분류
  const groups = [];
  let listBuf = [];

  function flushList() {
    if (!listBuf.length) return;
    groups.push({ type: 'list', items: [...listBuf] });
    listBuf = [];
  }

  for (const para of paras) {
    const t = para.trim();
    // "1. " 번호 목록
    const numMatch = t.match(/^(\d+)\.\s+(.+)/s);
    // "- " 불릿 목록
    const bulletMatch = !numMatch && t.match(/^-\s+(.+)/s);
    if (numMatch) {
      listBuf.push({ type: 'num', num: numMatch[1], body: numMatch[2].trim() });
    } else if (bulletMatch) {
      listBuf.push({ type: 'bullet', body: bulletMatch[1].trim() });
    } else {
      flushList();
      groups.push({ type: 'para', text: t });
    }
  }
  flushList();

  return groups.map(g => {
    if (g.type === 'list') {
      return '<div class="rule-list">' +
        g.items.map(item => {
          const body = renderInline(item.body);
          if (item.type === 'bullet') {
            return `<div class="rule-list-item"><span class="rule-list-num">•</span><span>${body}</span></div>`;
          }
          return `<div class="rule-list-item"><span class="rule-list-num">${item.num}.</span><span>${body}</span></div>`;
        }).join('') +
        '</div>';
    }

    const t = g.text;

    // 플레이 노트
    if (/^플레이 노트/.test(t)) {
      return `<div class="rule-note">${renderInline(t)}</div>`;
    }

    // 세그먼트 패턴: "제목(부가정보). 내용" 또는 "제목. 내용"
    // 예: "활성화 세그먼트. 활성 플레이어는..."
    //     "재배치 세그먼트(히든 모드 전용). 활성 플레이어는..."
    const segMatch = t.match(/^([^.]{1,35}세그먼트[^.]{0,20})\.\s+(.+)$/s);
    if (segMatch) {
      const title = segMatch[1].trim();
      const body = segMatch[2].trim();
      return `<div class="rule-seg"><div class="rule-seg-title">${escHtml(title)}</div><div class="rule-seg-body">${renderInline(body)}</div></div>`;
    }

    // **제목.** 본문 — 인라인 소제목 패턴
    const boldHeadMatch = t.match(/^\*\*(.+?)\*\*\s*(.*)/s);
    if (boldHeadMatch) {
      const heading = boldHeadMatch[1].trim();
      const rest = boldHeadMatch[2].trim();
      return `<div class="rule-subhead"><strong>${escHtml(heading)}</strong>${rest ? ' ' + renderInline(rest) : ''}</div>`;
    }

    return `<p>${renderInline(t)}</p>`;
  }).join('');
}

// 인라인 마크다운 처리: **볼드**, 일반 텍스트
function renderInline(text) {
  return escHtml(text).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
}

function renderRulesPanel(step) {
  const panel = document.getElementById('rules-panel');

  const refs = step.refs || [];

  if (refs.length === 0) {
    panel.innerHTML = `<div class="no-refs">이 스텝에 별도 규칙 참조가 없습니다.</div>`;
    return;
  }

  let html = '';
  for (const ref of refs) {
    const rule = RULES[ref];
    if (!rule) {
      html += `<div class="rule-card">
        <div class="rule-card-head">
          <span class="rule-id">${ref}</span>
          <span class="rule-title">섹션 없음</span>
        </div>
      </div>`;
      continue;
    }

    html += `<div class="rule-card">
      <div class="rule-card-head">
        <span class="rule-id">${rule.id}</span>
        <span class="rule-title">${rule.title}</span>
      </div>
      <div class="rule-card-body">`;

    html += textToHtml(cleanRuleText(rule.text));

    // 하위 섹션
    if (rule.children && rule.children.length > 0) {
      for (const childId of rule.children) {
        const child = RULES[childId];
        if (!child) continue;
        html += `<div class="rule-sub">
          <div class="rule-sub-head">
            <span class="rule-sub-id">${child.id}</span>
            ${child.title ? `<span class="rule-sub-title">${escHtml(child.title)}</span>` : ''}
          </div>`;
        html += textToHtml(cleanRuleText(child.text));
        html += `</div>`;
      }
    }

    html += `</div></div>`;
  }

  panel.innerHTML = html;
}

function renderNav(phase) {
  document.getElementById('btn-prev').disabled = (stepIndex === 0 && stack.length === 0);
  // 마지막 스텝에서도 → 버튼 항상 활성화 (복귀/리셋 가능)
  document.getElementById('btn-next').disabled = false;
}

// ──────────────────────────────────────────
// 네비게이션
// ──────────────────────────────────────────
function navigate(dir) {
  const phase = getPhase(phaseId);
  const newIdx = stepIndex + dir;

  if (dir > 0 && newIdx >= phase.steps.length) {
    // 마지막 스텝 → 다음: 스택 pop (상위 시퀀스 다음 스텝으로)
    if (stack.length > 0) {
      const prev = stack.pop();
      phaseId = prev.phaseId;
      stepIndex = prev.stepIndex + 1;  // 상위에서 다음 스텝으로
      const parentPhase = getPhase(phaseId);
      // 상위도 마지막이면 그 상위로 계속 pop
      if (stepIndex >= parentPhase.steps.length) {
        // 재귀적으로 처리: navigate(1) 다시 호출
        render();
        document.getElementById('step-panel').scrollTop = 0;
        document.getElementById('rules-panel').scrollTop = 0;
        navigate(1);
        return;
      }
    } else {
      // 최상위 (phase_1) 마지막 스텝 → 처음으로 리셋
      phaseId = 'phase_1';
      stepIndex = 0;
      stack = [];
    }
    render();
    document.getElementById('step-panel').scrollTop = 0;
    document.getElementById('rules-panel').scrollTop = 0;
    return;
  }

  if (dir < 0 && newIdx < 0) {
    // 첫 스텝 ← : 스택에서 이전 페이즈로
    if (stack.length > 0) {
      const prev = stack.pop();
      phaseId = prev.phaseId;
      stepIndex = prev.stepIndex;
      render();
    }
    return;
  }

  stepIndex = newIdx;
  render();
  document.getElementById('step-panel').scrollTop = 0;
  document.getElementById('rules-panel').scrollTop = 0;
}

function enterSequence(seqId) {
  // 현재 위치를 스택에 저장
  stack.push({ phaseId, stepIndex });
  phaseId = seqId;
  stepIndex = 0;
  render();
  document.getElementById('step-panel').scrollTop = 0;
  document.getElementById('rules-panel').scrollTop = 0;
}

function popToStack(idx) {
  // 스택의 특정 위치로 돌아가기
  const frame = stack[idx];
  stack = stack.slice(0, idx);
  phaseId = frame.phaseId;
  stepIndex = frame.stepIndex;
  render();
}

// ──────────────────────────────────────────
// 키보드
// ──────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') navigate(1);
  else if (e.key === 'ArrowLeft') navigate(-1);
});

// ──────────────────────────────────────────
// 유틸
// ──────────────────────────────────────────
function escHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ──────────────────────────────────────────
// 초기화
// ──────────────────────────────────────────
(async () => {
  try {
    await loadData();
    document.getElementById('loading').style.display = 'none';
    render();
  } catch (e) {
    document.getElementById('loading').innerHTML =
      `<p style="color:#d63031">데이터 로드 실패: ${e.message}</p>
       <p style="color:#aaa;font-size:0.8rem;margin-top:8px">로컬 파일로 열 때는 로컬 서버가 필요합니다.<br>
       터미널에서: <code style="background:#f0f0f0;padding:2px 6px;border-radius:3px">python3 -m http.server 8080</code></p>`;
  }
})();
</script>
